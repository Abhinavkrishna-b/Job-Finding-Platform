<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Listings | Job Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
        
        .status-tag {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        .status-tag.eligible {
            background-color: #e6f7f0;
            color: #0d8a4a;
        }

        .status-tag.not-eligible {
            background-color: #fde8e8;
            color: #c82a2a;
        }

        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a0aec0;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800">

    <nav class="bg-white text-gray-800 px-4 sm:px-6 py-3 flex justify-between items-center shadow-md sticky top-0 z-50 border-b border-gray-200">
        <a href="#" class="text-2xl font-bold text-blue-600">JobConnect</a>
        
        <div class="flex items-center gap-6">
            <a href="{% url 'ats_checker_page' %}" class="hidden sm:flex items-center justify-center gap-2 bg-green-600 hover:bg-green-700 text-white font-bold px-4 py-2.5 rounded-lg transition-transform hover:scale-105">
                <i class="fa-solid fa-file-shield"></i>
                ATS Resume Scan
            </a>

            {% if user_logged_in %}
            <div class="flex items-center gap-4 relative">
                <span class="hidden md:block font-medium text-gray-600 mr-2">Welcome, {{ user.username }}!</span>
                <div class="relative cursor-pointer" onclick="toggleDropdown()">
                    <i class="fa-solid fa-user-circle text-4xl text-gray-500 hover:text-blue-600 transition-colors duration-300"></i>
                    
                    <div id="dropdown-menu" class="hidden absolute right-0 mt-3 bg-white rounded-lg shadow-xl min-w-[180px] z-50 border border-gray-100">
                        <div class="p-4 border-b">
                            <p class="font-semibold text-gray-800">{{ user.username }}</p>
                            <p class="text-sm text-gray-500">{{ user.email }}</p>
                        </div>
                        <a href="{% url 'profile_view' user.username %}" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 text-gray-700">
                            <i class="fa-solid fa-user-pen w-5"></i> My Profile
                        </a>
                        <a href="{% url 'user_logout' %}" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 text-red-500 font-medium rounded-b-lg">
                            <i class="fa-solid fa-arrow-right-from-bracket w-5"></i> Logout
                        </a>
                    </div>
                </div>
            </div>
            {% else %}
            <a href="users/" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-5 py-2 rounded-lg transition-colors">Login</a>
            {% endif %}
        </div>
    </nav>


    <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-8">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">Find Your Next Opportunity</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <select id="roleFilter" onchange="filterJobs()" class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring focus:ring-blue-200 focus:ring-opacity-50 transition">
                    <option value="">Filter by Role</option>
                </select>
                <select id="companyFilter" onchange="filterJobs()" class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring focus:ring-blue-200 focus:ring-opacity-50 transition">
                    <option value="">Filter by Company</option>
                </select>
                <select id="locationFilter" onchange="filterJobs()" class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring focus:ring-blue-200 focus:ring-opacity-50 transition">
                    <option value="">Filter by Location</option>
                </select>
            </div>
        </div>

        <div id="job-list" class="grid gap-6 sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
            </div>
    </main>

    <div id="job-card-template" class="hidden">
        <div class="job-card bg-white p-6 rounded-xl shadow-md border border-gray-200 hover:shadow-xl hover:-translate-y-1.5 transition-all duration-300 flex flex-col">
            <div class="flex items-start justify-between mb-4">
                <div class="flex items-center gap-4">
                    <img src="" alt="Company Logo" class="company-logo w-12 h-12 rounded-lg bg-gray-200 object-contain">
                    <div>
                        <h2 class="job-role text-lg font-bold text-gray-800"></h2>
                        <p class="company-name text-gray-500 font-medium"></p>
                    </div>
                </div>
                <div class="status-container">
                    <span class="status-tag"></span>
                </div>
            </div>

            <div class="space-y-3 text-sm text-gray-600 mb-4 flex-grow">
                <p class="flex items-center gap-2"><i class="fa-solid fa-location-dot w-4 text-gray-400"></i> <span class="job-location"></span></p>
                <p class="flex items-center gap-2"><i class="fa-solid fa-star w-4 text-gray-400"></i> <span class="qualification"></span></p>
                <div class="flex items-start gap-2">
                    <i class="fa-solid fa-cogs w-4 text-gray-400 mt-1"></i>
                    <div class="required-skills-container flex flex-wrap gap-2">
                        </div>
                </div>
            </div>
            
            <div class="mt-auto pt-4 border-t border-gray-100">
                <button class="apply-button w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-lg font-semibold transition-colors duration-300 disabled:bg-gray-300 disabled:cursor-not-allowed">
                    Apply Now
                </button>
            </div>
        </div>
    </div>
    
    <div id="applyModal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md transform transition-all" id="modal-content">
            <h2 class="text-2xl font-bold mb-2 text-gray-800">Apply for <span id="jobRoleTitle" class="text-blue-600">Job</span></h2>
            <p class="mb-6 text-gray-500">Confirm your application details below.</p>

            <form id="personalInfoForm" method="POST" action="{% url 'apply_for_job' %}" class="space-y-4">
                {% csrf_token %}
                <input type="hidden" name="job_id" id="jobIdField" value="">
                
                <div>
                    <label for="user_name" class="block font-medium text-gray-600">Username</label>
                    <input type="text" id="user_name" name="user_name" value="{{ user.username }}" readonly class="w-full bg-gray-100 border-gray-300 rounded-lg px-3 py-2 mt-1 cursor-not-allowed">
                </div>
                <div>
                    <label for="companyField" class="block font-medium text-gray-600">Company</label>
                    <input type="text" id="companyField" name="company_name" value="" readonly class="w-full bg-gray-100 border-gray-300 rounded-lg px-3 py-2 mt-1 cursor-not-allowed">
                </div>
                <div>
                    <label for="jobRoleField" class="block font-medium text-gray-600">Job Role</label>
                    <input type="text" id="jobRoleField" name="job_role" value="" readonly class="w-full bg-gray-100 border-gray-300 rounded-lg px-3 py-2 mt-1 cursor-not-allowed">
                </div>
                <div class="flex justify-end gap-3 pt-4">
                    <button type="button" onclick="closeApplyModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold px-5 py-2 rounded-lg transition-colors">Cancel</button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-5 py-2 rounded-lg transition-colors">Confirm Application</button>
                </div>
            </form>
        </div>
    </div>


    <script>
        const jobs = [{% for job in job_list %}{
            job_id: "{{ job.id }}",
            job_role: "{{ job.job_role|escapejs }}",
            company_name: "{{ job.company|escapejs }}",
            location: "{{ job.location|escapejs }}",
            required_skill: "{{ job.required_skill|escapejs }}",
            qualification: "{{ job.qualification|escapejs }}",
            required_cgpa: "{{ job.CGPA }}",
            is_active: "{{ job.is_active }}",
            application_deadline: "{{ job.application_deadline }}"
        } {% if not forloop.last %}, {% endif %}{% endfor %}];

        const applied_jobs = [{% for ap_job in applied_jobs %}{
            job: "{{ ap_job.job.id }}",
            company: "{{ ap_job.company }}"
        } {% if not forloop.last %}, {% endif %}{% endfor %}];

        const user_cgpa = parseFloat("{{ user_profile.ug_cgpa|default:0 }}");

        function createJobCard(job) {
            const template = document.getElementById("job-card-template");
            if (!template) return;

            const jobCard = template.firstElementChild.cloneNode(true);

            // --- Set Job Card Content ---
            jobCard.querySelector(".job-role").textContent = job.job_role;
            jobCard.querySelector(".company-name").textContent = job.company_name;
            jobCard.querySelector(".job-location").textContent = job.location;
            jobCard.querySelector(".qualification").textContent = job.qualification;

            // --- IMAGE FIX: Dynamically fetch and set company logo ---
            const logo = jobCard.querySelector(".company-logo");
            const companyDomain = job.company_name.toLowerCase().replace(/[^a-z0-9]/g, '') + '.com';
            logo.src = `https://logo.clearbit.com/${companyDomain}`;
            // Fallback if logo isn't found
            logo.onerror = () => {
                const companyInitials = job.company_name.split(' ').map(n => n[0]).join('').substring(0, 2);
                logo.src = `https://ui-avatars.com/api/?name=${companyInitials}&background=e0e7ff&color=4f46e5&bold=true`;
            };


            // Create skill tags
            const skillsContainer = jobCard.querySelector(".required-skills-container");
            const skills = job.required_skill.split(',').map(s => s.trim());
            skills.forEach(skill => {
                if (skill) {
                    const skillTag = document.createElement('span');
                    skillTag.className = 'bg-gray-100 text-gray-700 px-2.5 py-1 rounded-md text-xs font-medium border border-gray-200';
                    skillTag.textContent = skill;
                    skillsContainer.appendChild(skillTag);
                }
            });

            // Set eligibility status
            const statusSpan = jobCard.querySelector(".status-tag");
            if (user_cgpa >= parseFloat(job.required_cgpa)) {
                statusSpan.innerHTML = `<i class="fa-solid fa-check-circle"></i> Eligible`;
                statusSpan.classList.add("eligible");
            } else {
                statusSpan.innerHTML = `<i class="fa-solid fa-times-circle"></i> Not Eligible`;
                statusSpan.classList.add("not-eligible");
            }

            // Configure apply button
            const applyButton = jobCard.querySelector(".apply-button");
            const alreadyApplied = applied_jobs.some(applied => applied.job == job.job_id);
            const deadline = new Date(job.application_deadline);
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            if (alreadyApplied) {
                applyButton.disabled = true;
                applyButton.className = "apply-button w-full bg-green-100 text-green-800 px-4 py-2.5 rounded-lg font-semibold cursor-not-allowed border border-green-200";
                applyButton.textContent = "Applied";
            } else if (job.is_active === false || job.is_active === "False") {
                applyButton.disabled = true;
                applyButton.textContent = "Temporarily Closed";
            } else if (today > deadline) {
                applyButton.disabled = true;
                applyButton.className = "apply-button w-full bg-red-100 text-red-800 px-4 py-2.5 rounded-lg font-semibold cursor-not-allowed border border-red-200";
                applyButton.textContent = "Deadline Passed";
            } else {
                applyButton.addEventListener("click", function() {
                    applyForJob(job.job_role, job.required_cgpa, job.company_name, job.job_id);
                });
            }

            return jobCard;
        }
        
        // --- Functions for Filtering and Rendering ---
        function populateFilters() {
            const roles = new Set(), companies = new Set(), locations = new Set();
            jobs.forEach(job => {
                roles.add(job.job_role);
                companies.add(job.company_name);
                locations.add(job.location);
            });

            function fillDropdown(id, values) {
                const select = document.getElementById(id);
                Array.from(values).sort().forEach(value => {
                    const option = document.createElement("option");
                    option.value = value;
                    option.textContent = value;
                    select.appendChild(option);
                });
            }

            fillDropdown("roleFilter", roles);
            fillDropdown("companyFilter", companies);
            fillDropdown("locationFilter", locations);
        }

        function filterJobs() {
            const role = document.getElementById("roleFilter").value;
            const company = document.getElementById("companyFilter").value;
            const location = document.getElementById("locationFilter").value;

            const filteredJobs = jobs.filter(job =>
                (!role || job.job_role === role) &&
                (!company || job.company_name === company) &&
                (!location || job.location === location)
            );

            renderJobs(filteredJobs);
        }

        function renderJobs(filteredJobs = jobs) {
            const jobList = document.getElementById("job-list");
            jobList.innerHTML = ''; 

            if (filteredJobs.length === 0) {
                 jobList.innerHTML = `<div class="md:col-span-2 lg:col-span-3 text-center py-12 px-6 bg-white rounded-xl shadow-sm border">
                    <i class="fa-solid fa-magnifying-glass text-4xl text-gray-400 mb-4"></i>
                    <h3 class="text-xl font-semibold text-gray-700">No Jobs Found</h3>
                    <p class="text-gray-500 mt-2">Please try adjusting your filters or check back later.</p>
                 </div>`;
            } else {
                filteredJobs.forEach(job => {
                    const card = createJobCard(job);
                    if (card) jobList.appendChild(card);
                });
            }
        }
        
        // --- Dropdown, Modal, and Application Logic ---
        function toggleDropdown() {
            document.getElementById("dropdown-menu").classList.toggle("hidden");
        }
        document.addEventListener("click", (e) => {
            const dropdownMenu = document.getElementById("dropdown-menu");
            const dropdownToggle = dropdownMenu.previousElementSibling;
            if (!dropdownToggle.contains(e.target) && !dropdownMenu.contains(e.target)) {
                dropdownMenu.classList.add("hidden");
            }
        });

        const requiredFields = {
            email: "{{ user.email|default:'' }}", phone: "{{ user.phone_number|default:'' }}", gender: "{{ user_profile.gender|default:'' }}",
            dob: "{{ user_profile.date_of_birth|default:'' }}", location: "{{ user_profile.location|default:'' }}", tenthPercentage: "{{ user_profile.tenth_percentage|default:'' }}",
            twelfthPercentage: "{{ user_profile.twelfth_percentage|default:'' }}", ugCgpa: "{{ user_profile.ug_cgpa|default:'' }}", backlogsHistory: "{{ user_profile.backlogs_history|default:'' }}",
            resume: "{{ user_profile.resume|default:'' }}"
        };

        function isProfileComplete() {
            for (const field in requiredFields) {
                if (!requiredFields[field] || requiredFields[field] === "None") return field;
            }
            return true;
        }

        function redirectToProfile(field) {
            alert("Please complete your profile first! The '" + field + "' field is missing.");
            window.location.href = `{% url 'profile_view' user.username %}?highlight=${field}`;
        }

        function applyForJob(jobRole, requiredCgpa, company, job_id) {
            const missingField = isProfileComplete();
            if (missingField !== true) {
                redirectToProfile(missingField);
            } else if (user_cgpa < parseFloat(requiredCgpa)) {
                alert(`Your CGPA does not meet the requirement of ${requiredCgpa} for this role.`);
            } else {
                openApplyModal(jobRole, company, job_id);
            }
        }
        
        function openApplyModal(jobRole, company, job_id) {
            document.getElementById("companyField").value = company;
            document.getElementById("jobRoleField").value = jobRole;
            document.getElementById("jobIdField").value = job_id;
            document.getElementById("jobRoleTitle").textContent = jobRole;
            document.getElementById("applyModal").classList.remove("hidden");
        }

        function closeApplyModal() {
            document.getElementById("applyModal").classList.add("hidden");
        }

        document.addEventListener("DOMContentLoaded", () => {
            populateFilters();
            renderJobs();
        });
    </script>
</body>
</html>
